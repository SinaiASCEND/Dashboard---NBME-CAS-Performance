  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ize:17px;color:#153657\">Filters<\/span>\n          <button onclick=\"{{ closeSheet }}\" style=\"background:#EEF3F9;border:none;color:#2E75B6;font-family:inherit;font-weight:700;font-size:13px;border-radius:999px;padding:7px 16px;cursor:pointer\">Done<\/button>\n        <\/div>\n\n        <sc-if value=\"{{ mepoIsClinical }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"margin-bottom:18px\">\n            <div style=\"font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#6E7E92;font-weight:700;margin-bottom:9px\">Cohort<\/div>\n            <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n              <sc-for list=\"{{ mepoCohList }}\" as=\"c\" hint-placeholder-count=\"2\"><button onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.label }}<\/button><\/sc-for>\n            <\/div>\n          <\/div>\n          <div style=\"margin-bottom:18px\">\n            <div style=\"font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#6E7E92;font-weight:700;margin-bottom:9px\">Assessment scope<\/div>\n            <div class=\"noscb\" style=\"display:flex;gap:8px;overflow-x:auto;padding-bottom:3px\">\n              <sc-for list=\"{{ mepoScopeList }}\" as=\"s\" hint-placeholder-count=\"3\"><button onclick=\"{{ s.onClick }}\" style=\"{{ s.style }};flex:none;white-space:nowrap\">{{ s.label }}<\/button><\/sc-for>\n            <\/div>\n          <\/div>\n          <div style=\"margin-bottom:18px\">\n            <div style=\"font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#6E7E92;font-weight:700;margin-bottom:9px\">Cut-score rule<\/div>\n            <div style=\"display:flex;background:#F4F6FA;border:1px solid #D5DEE9;border-radius:8px;overflow:hidden\">\n              <sc-for list=\"{{ mepoCutRuleList }}\" as=\"cr\" hint-placeholder-count=\"3\"><button onclick=\"{{ cr.onClick }}\" style=\"{{ cr.style }}\">{{ cr.label }}<\/button><\/sc-for>\n            <\/div>\n          <\/div>\n          <div style=\"margin-bottom:16px\">\n            <div style=\"font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#6E7E92;font-weight:700;margin-bottom:9px\">MEPO decision rule<\/div>\n            <div style=\"display:flex;background:#F4F6FA;border:1px solid #D5DEE9;border-radius:8px;overflow:hidden\">\n              <sc-for list=\"{{ mepoDecisionList }}\" as=\"dr\" hint-placeholder-count=\"2\"><button onclick=\"{{ dr.onClick }}\" style=\"{{ dr.style }}\">{{ dr.label }}<\/button><\/sc-for>\n            <\/div>\n          <\/div>\n          <div style=\"font-size:11px;color:#52606E;line-height:1.5;background:#EEF3F9;border-left:3px solid #2E75B6;padding:9px 12px;border-radius:0 6px 6px 0;margin-bottom:18px\">{{ mepoCutRuleNote }}<\/div>\n        <\/sc-if>\n\n        <div style=\"margin-bottom:8px;opacity:{{ mepoSliderOpacity }};transition:opacity .2s\">\n          <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:11px\"><span style=\"font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#6E7E92;font-weight:700\">Fixed cut<\/span><span style=\"font-size:15px;font-weight:700;color:#2E75B6\">{{ mepoThreshLabel }}<\/span><\/div>\n          <div style=\"display:flex;align-items:center;gap:11px\">\n            <span style=\"font-size:11px;color:#9FB0C2;font-weight:600\">40<\/span>\n            <input type=\"range\" min=\"40\" max=\"100\" step=\"1\" value=\"{{ mepoThreshold }}\" onchange=\"{{ mepoThreshInput }}\" oninput=\"{{ mepoThreshInput }}\" style=\"flex:1;height:26px;cursor:pointer\">\n            <span style=\"font-size:11px;color:#9FB0C2;font-weight:600\">100<\/span>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n\n  <\/div>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:446,&quot;height&quot;:884}}\">\nclass Component extends DCLogic {\n  state = { mepoMode:'clinical', mepoCohort:'2028', mepoScope:'all', mepoThreshold:80, cutRule:'sd1', decisionRule:'conjunctive', pillFilter:'all', sheetOpen:false, expanded:{} };\n\n  componentDidMount(){ if(window.SKILLS_DATA && window.CURR_DATA) return; let tries=0; this._dataTick=setInterval(()=>{ tries++; const ready=window.SKILLS_DATA && window.CURR_DATA; if(ready||tries>80){ clearInterval(this._dataTick); this.setState({_dataReady:tries}); } },100); }\n  componentWillUnmount(){ if(this._dataTick) clearInterval(this._dataTick); }\n  D(){ if(!this._dataF){ const src=window.SKILLS_DATA; if(!src) return src; this._dataF=this.buildData(src); } return this._dataF; }\n  buildData(src){\n    const D=JSON.parse(JSON.stringify(src));\n    const DROP=new Set(['CBSE Exam']);\n    Object.keys(D.cohorts||{}).forEach(ck=>{ const coh=D.cohorts[ck];\n      Object.keys(coh.modules||{}).forEach(mk=>{ const md=coh.modules[mk];\n        if(md.assessments) md.assessments=md.assessments.filter(a=>!DROP.has(a.label));\n        (md.students||[]).forEach(s=>{\n          if(s.assess) s.assess=s.assess.filter(a=>!DROP.has(a.label));\n          const by={}; (s.assess||[]).forEach(a=>{ if(a.pct!=null){ (by[a.domain]=by[a.domain]||[]).push(a.pct); } });\n          if(s.skills && s.skills['Clinical Reasoning']!=null){ const cr=by['Clinical Reasoning']; if(cr&&cr.length) s.skills['Clinical Reasoning']=cr.reduce((x,y)=>x+y,0)/cr.length; else delete s.skills['Clinical Reasoning']; }\n          const sv=Object.values(s.skills||{}).filter(v=>v!=null); if(sv.length) s.overall=sv.reduce((x,y)=>x+y,0)/sv.length;\n        });\n      });\n    });\n    return D;\n  }\n\n  modulesFor(c){ const o=this.D().moduleOrder; const h=this.D().cohorts[c].modules; return o.filter(m=>h[m]); }\n  mean(a){ return a.length? a.reduce((x,y)=>x+y,0)/a.length : 0; }\n  quart(arr){ const a=[...arr].sort((x,y)=>x-y); const n=a.length; if(!n) return {min:0,q1:0,med:0,q3:0,max:0};\n    const q=p=>{ const i=(n-1)*p, lo=Math.floor(i), hi=Math.ceil(i); return a[lo]+(a[hi]-a[lo])*(i-lo); };\n    return {min:a[0],q1:q(.25),med:q(.5),q3:q(.75),max:a[n-1]}; }\n  friendlyLabel(raw){\n    const M={\n      'POM Week History':'Took a focused patient history','Mid-term History Checklist':'History-taking checklist (midterm)','Mid-term OSCE Social Checklist':'Gathered social & psychosocial history (midterm)','Midterm Clinical Skills':'Combined history & exam station (midterm)','Final Exam H&P Hx Checklist':'Took a complete history (final H&P)',\n      'POM Week Patient Encounter':'Performed a physical exam on a patient','Mid-term Physical Exam Checklist':'Physical-exam checklist (midterm)','Final OSCE Cardio Checklist':'Performed a cardiovascular exam (final)','Final OSCE PE Abdominal Checklist':'Performed an abdominal exam (final)','Final OSCE Patient Encounter':'Conducted a full patient encounter (final)','Final PE skills':'Demonstrated physical-exam skills (final)',\n      'POM Week Write-UP':'Wrote up a clinical encounter','Daily Progress Note Written Assessment':'Wrote a daily progress note','Mid-term History Write Up':'Wrote up a patient history (midterm)','Mid-term OSCE HPI Write-Up':'Documented the history of present illness (midterm)','Mid-term Physical Exam Write Up':'Documented physical-exam findings (midterm)','Midterm Write-Up':'Wrote up a clinical encounter (midterm)','Final Exam Complete H&P Note':'Wrote a complete H&P note (final)','Final Exam Triadic Interviewing Note':'Documented a patient-centered EHR visit (final)','Final OSCE Full Note Write-Up':'Wrote a full encounter note (final)','Final OSCE PE Abdominal Write-Up':'Documented an abdominal exam (final)','Final OSCE PE Cardiology Write-Up':'Documented a cardiovascular exam (final)','Final OSCE_Write Up':'Wrote an encounter note (final)','Final Write Up':'Wrote up a clinical encounter (final)','Triadic Interviewing OSCE Write-Up':'Documented a patient-centered EHR visit',\n      'Final Exam Triadic Interviewing Checklist':'Patient-centered interviewing with the EHR (final)','Final Patient Education':'Counseled & educated a patient (final)','Midterm Delivering Serious News OSCE':'Delivered serious news to a patient (midterm)','Midterm Triadic Interviewing OSCE':'Patient-centered interviewing with the EHR (midterm)',\n      'Ethics Short Essay Assessment':'Reasoned through a medical-ethics case','Faculty Observation Checklist Total Score':'Observed professional behavior (faculty rating)',\n      'Final Morning Rounds':'Reasoned through cases on rounds (final)','Final OSCE Oral Presentation':'Gave an oral case presentation (final)','Lab Interpretation Exam 1':'Interpreted laboratory results'\n    };\n    return (M[raw]||raw).replace(/midterm/gi,'mid-module').replace(/final/gi,'end-of-module');\n  }\n  domColor(d){ return {'History Taking':'#2E75B6','Physical Exam':'#D4A017','Clinical Reasoning':'#1F4E79','Documentation':'#153657','Communication':'#548235','Professionalism':'#BF8F00'}[d]||'#153657'; }\n\n  // ---- interaction ----\n  openSheet(){ this.setState({sheetOpen:true}); }\n  closeSheet(){ this.setState({sheetOpen:false}); }\n  toggleRow(id){ this.setState(s=>{ const ex={...(s.expanded||{})}; ex[id]=!ex[id]; return {expanded:ex}; }); }\n  jumpExpand(id){ this.setState(s=>{ const ex={...(s.expanded||{})}; ex[id]=true; return {expanded:ex}; }); setTimeout(()=>this.scrollToRow(id),60); }\n  scrollToRow(id){ const el=document.getElementById(id); const sc=document.getElementById('meposcroll'); if(!el||!sc) return; const start=sc.scrollTop; const target=Math.max(0, start + (el.getBoundingClientRect().top - sc.getBoundingClientRect().top) - 10); const t0=performance.now(), dur=420; const step=(now)=>{ const k=Math.min(1,(now-t0)/dur); sc.scrollTop=start+(target-start)*(0.5-0.5*Math.cos(Math.PI*k)); if(k<1) requestAnimationFrame(step); }; requestAnimationFrame(step); }\n  setMode(m){ this.setState({mepoMode:m, pillFilter:'all'}); }\n\n  decorate(out){\n    const ex=this.state.expanded||{};\n    const rows=out.mepoRows||[];\n    rows.forEach(r=>{ r.expanded=!!ex[r.rowId]; r.chev=r.expanded?'180deg':'0deg'; r.onToggle=()=>this.toggleRow(r.rowId); r.hasSkills=!!(r.skills&&r.skills.length); r.hasOutcome=!!(r.outcome || (r.outcomeList&&r.outcomeList.length)); });\n    const ids=rows.map(r=>r.rowId);\n    const allOpen=ids.length>0 && ids.every(id=>ex[id]);\n    out.toggleAllLabel=allOpen?'Collapse all':'Expand all';\n    out.onToggleAll=()=>{ this.setState(s=>{ const e={...(s.expanded||{})}; ids.forEach(id=>{ e[id]=!allOpen; }); return {expanded:e}; }); };\n    out.listHeading=rows.length+' '+(this.state.mepoMode==='cognitive'?'cognitive':'clinical')+' objective'+(rows.length===1?'':'s');\n    // bottom nav\n    out.onTabClinical=()=>this.setMode('clinical'); out.onTabCognitive=()=>this.setMode('cognitive');\n    out.navClinColor=this.state.mepoMode==='clinical'?'#153657':'#9FB0C2';\n    out.navCogColor=this.state.mepoMode==='cognitive'?'#153657':'#9FB0C2';\n    // sheet\n    const open=!!this.state.sheetOpen;\n    out.openSheet=()=>this.openSheet(); out.closeSheet=()=>this.closeSheet();\n    out.sheetY=open?'0%':'110%'; out.sheetBackdrop=open?'1':'0'; out.sheetEvents=open?'auto':'none';\n    return out;\n  }\n\n  mepoChain(){\n    const D=this.D(), S=this.state, fmt=v=>Math.round(v)+'%';\n    const coh=(S.mepoCohort&&D.cohorts[S.mepoCohort])?S.mepoCohort:'2028';\n    const cohMods=this.modulesFor(coh);\n    const scope=(S.mepoScope&&(S.mepoScope==='all'||cohMods.includes(S.mepoScope)))?S.mepoScope:'all';\n    const scopeMods=scope==='all'?cohMods:[scope];\n    const benchmark=(typeof S.mepoThreshold==='number'?Math.max(40,Math.min(100,S.mepoThreshold)):80);\n    const threshLeft=((benchmark-40)/60*100)+'%';\n    const cutRule=['fixed','sd1','p10'].includes(S.cutRule)?S.cutRule:'fixed';\n    const decisionRule=(S.decisionRule==='conjunctive')?'conjunctive':'compensatory';\n    const GOAL=80;\n    const cutRuleName={fixed:'a fixed '+benchmark+'% cut',sd1:'the norm-referenced mean\\u22121\\u00a0SD rule',p10:'the 10th-percentile rule'}[cutRule];\n\n    const SKILLS={1:['History Taking','Physical Exam'],2:['Clinical Reasoning'],3:['Clinical Reasoning'],5:['Communication'],19:['Communication'],21:['Documentation'],15:['Professionalism'],16:['Professionalism']};\n    const OUTCOME={1:'Independently gather an accurate, prioritized history and perform a focused, hypothesis-driven physical examination.',2:'Interpret common diagnostic data and integrate findings into a coherent clinical assessment.',3:'Prioritize a differential diagnosis and recommend appropriate diagnostic or therapeutic next steps.',5:'Counsel and educate patients and families in plain language to support shared decision-making.',19:'Communicate effectively and empathically with patients and families across diverse backgrounds.',21:'Produce timely, accurate, and well-organized documentation of a clinical encounter.',15:'Apply ethical principles consistently and recognize ethical issues in the care of patients.',16:'Act with honesty, integrity, and respect toward patients, peers, staff, and faculty.'};\n    const EPAMAP={1:[1],2:[2],3:[2],5:[6],19:[6],21:[5],15:[11],16:[13]};\n    const EPATXT={1:'Gather a history & perform a physical exam',2:'Prioritize a differential diagnosis',3:'Recommend & interpret diagnostic tests',5:'Document a clinical encounter',6:'Give an oral presentation of an encounter',11:'Obtain informed consent',13:'Identify system failures & ensure safety'};\n    let CANON=[];\n    if(window.CURR_DATA && window.CURR_DATA.domains){ window.CURR_DATA.domains.forEach(d=>d.mepos.forEach(m=>CANON.push({n:m.n, badge:'MEPO '+m.n, group:d.name, color:d.accent, text:m.title}))); CANON.sort((a,b)=>a.n-b.n); }\n\n    const barW=v=>(v==null?0:((Math.max(40,Math.min(100,v))-40)/60*100))+'%';\n    const modulesAssessing=(skills)=>cohMods.filter(m=>{ const md=D.cohorts[coh].modules[m]; if(!md) return false; const present=new Set(md.assessments.map(a=>a.domain)); return skills.some(d=>present.has(d)); });\n    const stdev=(arr)=>{ const n=arr.length; if(n<2) return 0; const m=this.mean(arr); return Math.sqrt(arr.reduce((x,v)=>x+(v-m)*(v-m),0)/(n-1)); };\n    const pctile=(arr,p)=>{ const a=[...arr].sort((x,y)=>x-y); const n=a.length; if(!n) return 0; const i=(n-1)*p, lo=Math.floor(i), hi=Math.ceil(i); return a[lo]+(a[hi]-a[lo])*(i-lo); };\n    const cutFor=(vals)=>{ let c; if(cutRule==='sd1') c=this.mean(vals)-stdev(vals); else if(cutRule==='p10') c=pctile(vals,0.10); else c=benchmark; return Math.round(Math.max(40,Math.min(100,c))); };\n    const metricsFor=(skills, mods)=>{\n      const students=[], instr={};\n      mods.forEach(m=>{ const md=D.cohorts[coh].modules[m]; if(!md) return;\n        md.students.forEach(s=>{\n          let sw=0, ww=0; const mine=[];\n          s.assess.forEach(a=>{ if(skills.includes(a.domain) && a.pct!=null){ const w=a.max||1; sw+=a.pct*w; ww+=w; const key=m+'|'+a.label; (instr[key]=instr[key]||{vals:[],max:a.max||1,mod:m,label:a.label}); instr[key].vals.push(a.pct); mine.push({key,pct:a.pct}); } });\n          if(ww>0) students.push({composite:sw/ww, items:mine});\n        });\n      });\n      const nn=students.length; if(!nn) return null;\n      Object.keys(instr).forEach(k=>{ const o=instr[k]; o.cut=cutFor(o.vals); o.mean=this.mean(o.vals); o.clear=Math.round(o.vals.filter(v=>v>=o.cut).length/o.vals.length*100); });\n      const totW=Object.values(instr).reduce((x,o)=>x+o.max,0)||1;\n      const compositeCut=Object.values(instr).reduce((x,o)=>x+o.cut*o.max,0)/totW;\n      const instrList=Object.keys(instr).map(k=>{ const o=instr[k]; return {label:o.label, mod:o.mod, mean:o.mean, max:o.max, wt:o.max/totW, cut:o.cut, clear:o.clear, key:k}; }).sort((a,b)=>b.mean-a.mean);\n      let comp=0, conj=0;\n      students.forEach(st=>{ if(st.composite>=compositeCut) comp++; if(st.items.length && st.items.every(it=>it.pct>=instr[it.key].cut)) conj++; });\n      const compMean=this.mean(students.map(s=>s.composite));\n      const q=this.quart(students.map(s=>s.composite));\n      return {n:nn, mean:compMean, med:q.med, compositeCut:Math.round(compositeCut), pctComp:Math.round(comp/nn*100), pctConj:Math.round(conj/nn*100), instrList};\n    };\n\n    const rows=[], greyRows=[]; const pillStatus={};\n    let meetCount=0, assessedCount=0, meanAcc=[];\n    CANON.forEach(M=>{\n      const skills=SKILLS[M.n], gcolor=M.color;\n      if(!skills){ pillStatus[M.n]='none'; greyRows.push({code:'g'+M.n, badge:M.badge, group:M.group, text:M.text}); return; }\n      assessedCount++;\n      const assessedIn=modulesAssessing(skills);\n      const inScope = scope==='all' || assessedIn.includes(scope);\n      const met=inScope?metricsFor(skills, scopeMods):null;\n      const skillChips=skills.map(d=>({name:d, color:this.domColor(d)}));\n      const epas=(EPAMAP[M.n]||[]).map(n=>({lab:'EPA '+n, t:EPATXT[n]||''}));\n      const row={ code:'mepo'+M.n, badge:M.badge, group:M.group, groupColor:gcolor, text:M.text, skills:skillChips, epas, outcome:OUTCOME[M.n]||'', assessedInLabel:assessedIn.join(' · '), hasData:!!met, singleOutcome:true, multiOutcome:false, clinMeasure:false, cogMeasure:false, showThresh:true, outcomeList:[], rowId:'cf-'+M.n };\n      if(met){\n        meanAcc.push(met.mean);\n        const achieveRate = decisionRule==='conjunctive'?met.pctConj:met.pctComp;\n        const meets = achieveRate>=GOAL;\n        if(meets) meetCount++;\n        row.instruments=met.instrList.map(i=>{ const fails=i.mean<i.cut; return { prefix:i.mod+': ', label:this.friendlyLabel(i.label), file:i.label+' · cut '+i.cut+'% · '+i.clear+'% clear', val:fmt(i.mean), barW:barW(i.mean), barColor:i.mean>=i.cut?'#548235':'#C0392B', threshLeft:barW(i.cut), pts:i.max+' pts', flag:fails?'⚠ ':'' }; });\n        const bind=met.instrList.length?met.instrList.reduce((lo,i)=>((i.mean-i.cut)<(lo.mean-lo.cut)?i:lo)):null;\n        row.weakLabel=bind?(bind.mod+': '+this.friendlyLabel(bind.label)):''; row.weakVal=bind?(fmt(bind.mean)+' vs cut '+bind.cut+'%'):'';\n        row.meanVal=achieveRate+'%'; row.meanW=barW(met.mean);\n        row.meets=meets; pillStatus[M.n]=meets?'meet':'below';\n        row.threshLeft=barW(met.compositeCut); row.atLabel='cohort mean'; row.pctVal=fmt(met.mean);\n        row.benchLabel=(decisionRule==='conjunctive'?'Conjunctive':'Compensatory')+' · goal '+GOAL+'%';\n        row.benchColor=meets?'#548235':'#BF8F00';\n        row.benchBg=meets?'#EAF3E6':'#FBF2DB';\n        row.medVal=fmt(met.med);\n        row.compositeNote = decisionRule==='conjunctive'\n          ? 'Conjunctive — achieved only by clearing every method\\u2019s own cut; the binding method sets the rate. Cuts via '+cutRuleName+'.'\n          : 'Compensatory — a strong method offsets a weak one; achievement = weighted composite vs the blended cut ('+Math.round(met.compositeCut)+'%). Cuts via '+cutRuleName+'.';\n        row.n=met.n; row.clinMeasure=true;\n      } else {\n        row.scopeNote='Not assessed in '+(scope==='all'?'Phase 1':scope)+(assessedIn.length?' — assessed in '+assessedIn.join(', '):'');\n        pillStatus[M.n]='none';\n      }\n      rows.push(row);\n    });\n\n    const overallMean=meanAcc.length?this.mean(meanAcc):0;\n    const cohList=Object.keys(D.cohorts).map(id=>({ label:'Class of '+id, onClick:()=>this.setState({mepoCohort:id, mepoScope:'all'}),\n      style:`padding:9px 16px;border:1.5px solid ${id===coh?'#2E75B6':'#D5DEE9'};background:${id===coh?'#2E75B6':'#fff'};color:${id===coh?'#fff':'#153657'};border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600` }));\n    const scopeOpts=[{k:'all',label:'All Phase 1'}].concat(cohMods.map(m=>({k:m,label:m})));\n    const scopeList=scopeOpts.map(o=>({ label:o.label, onClick:()=>this.setState({mepoScope:o.k}),\n      style:`padding:8px 14px;border:1px solid ${o.k===scope?'#2E75B6':'#D5DEE9'};background:${o.k===scope?'#2E75B6':'#fff'};color:${o.k===scope?'#fff':'#153657'};border-radius:8px;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600` }));\n\n    const pf=S.pillFilter||'all'
